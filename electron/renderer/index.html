<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>DeskMate</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="messages">
    <div class="msg deskmate">
      Hi, I'm DeskMate. Ask me about your files — real replies now, over IPC
      to the same engine the terminal app uses.
    </div>
  </div>
  <div id="input-row">
    <input id="input" type="text" placeholder="Type a message..." autofocus />
    <button id="send">Send</button>
  </div>
  <script src="renderer.js"></script>
</body>
</html>
